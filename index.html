
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mochi Multiplayer Deluxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF0F5;
            color: #5D4037;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #FFE4E1;
            background-image: 
                linear-gradient(45deg, #FFB5E8 25%, transparent 25%, transparent 75%, #FFB5E8 75%, #FFB5E8),
                linear-gradient(45deg, #FFB5E8 25%, transparent 25%, transparent 75%, #FFB5E8 75%, #FFB5E8);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            transition: transform 0.1s;
        }

        /* Screen Shake Effect */
        .shake-screen {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .bg-overlay {
            position: absolute; inset: 0;
            background: rgba(255, 240, 245, 0.85); z-index: 0;
        }

        /* Area Nampan */
        #tray {
            background: #FFFFFF;
            border: 6px solid #FFC9DE;
            border-radius: 35px;
            box-shadow: 0 10px 0 #FFAFCC, inset 0 0 20px rgba(255,181,232,0.5);
            position: relative; z-index: 10; padding: 20px;
        }

        .hole {
            position: relative; width: 100%; aspect-ratio: 1 / 1.1;
            overflow: hidden; border-radius: 20px;
        }

        .bowl-back {
            position: absolute; bottom: 0; left: 5%; width: 90%; height: 40%;
            background: #FFDFBA; border-radius: 50%;
            box-shadow: inset 0 -10px 0 rgba(255, 179, 186, 0.5); z-index: 1;
        }

        .mochi-wrapper {
            position: absolute; bottom: 10%; left: 5%; width: 90%; height: 80%;
            z-index: 2; transform: translateY(110%);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .mochi-wrapper.up { transform: translateY(0%); }
        .mochi-wrapper.squished svg {
            transform: scale(1.3, 0.4) translateY(50%);
            transition: transform 0.1s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        svg { width: 100%; height: 100%; transition: transform 0.2s ease; transform-origin: bottom center; }

        .bowl-front {
            position: absolute; bottom: -5%; left: 5%; width: 90%; height: 35%;
            background: #FFB3BA; border-radius: 50%; z-index: 3;
            border-bottom: 4px solid #FF70A6;
        }

        .floating-text {
            position: absolute; font-size: 1.5rem; font-weight: 900;
            text-shadow: 2px 2px 0px #FFF, -2px -2px 0px #FFF, 2px -2px 0px #FFF, -2px 2px 0px #FFF;
            z-index: 50; pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        /* Combo Text Animation */
        .combo-text {
            color: #F59E0B;
            font-size: 1.2rem;
            animation: comboPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5) rotate(5deg); opacity: 0; }
        }

        @keyframes comboPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Loader */
        .loader {
            border: 4px solid #FFF0F5; border-top: 4px solid #FF4F7A;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Icon Utilities */
        .icon { width: 24px; height: 24px; display: inline-block; vertical-align: middle; }

        /* Particle System */
        .particle {
            position: absolute;
            width: 8px; height: 8px;
            background: #FCD34D;
            border-radius: 50%;
            pointer-events: none;
            z-index: 40;
            animation: shoot 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="bg-overlay"></div>

    <!-- UI Header Game -->
    <div class="px-4 py-6 flex justify-between items-start z-20 hidden" id="game-ui">
        <!-- Skorku & Combo -->
        <div class="flex flex-col gap-2">
            <div class="bg-white rounded-2xl px-3 py-2 border-4 border-[#FFC9DE] shadow-[0_4px_0_#FFC9DE] flex flex-col items-center min-w-[85px] transition-transform" id="my-score-box">
                <span class="text-[9px] font-black text-[#FF70A6] uppercase tracking-widest">Skorku</span>
                <span id="my-score" class="text-2xl font-black text-[#FF4F7A] leading-none mt-1">0</span>
            </div>
            <div id="combo-display" class="text-center font-black opacity-0 transition-opacity">
                <span class="bg-[#FCD34D] text-[#5D4037] text-[10px] px-2 py-1 rounded-full shadow-sm border-2 border-white">Kombo x<span id="combo-count">1</span></span>
            </div>
        </div>
        
        <!-- Timer -->
        <div class="flex flex-col items-center bg-[#FF4F7A] text-white px-5 py-2 rounded-[20px] border-4 border-white shadow-md">
            <span class="text-[10px] font-black uppercase opacity-90 tracking-widest mb-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="w-3 h-3 inline-block -mt-0.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Waktu
            </span>
            <span id="time" class="text-3xl font-black leading-none">30s</span>
        </div>

        <!-- Skor Lawan -->
        <div class="bg-[#FFF0F5] rounded-2xl px-3 py-2 border-4 border-[#FFC9DE] shadow-[0_4px_0_#FFC9DE] flex flex-col items-center min-w-[85px] transition-transform" id="opp-score-box">
            <span class="text-[9px] font-black text-[#FF70A6] uppercase tracking-widest">Lawan</span>
            <span id="opp-score" class="text-2xl font-black text-[#FF70A6] leading-none mt-1">0</span>
        </div>
    </div>

    <!-- Papan Game -->
    <div class="flex-grow flex items-center justify-center p-4 z-20 mb-10 hidden" id="game-board">
        <div id="tray" class="w-full max-w-[360px] aspect-square grid grid-cols-3 gap-3 relative">
            <!-- 9 Lubang digenerate via JS -->
        </div>
    </div>

    <!-- MENU UTAMA (LOBBY) -->
    <div id="menu-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[35px] shadow-2xl text-center max-w-[100%] w-[340px] pop-in border-[6px] border-[#FFC9DE] relative">
            
            <h2 class="text-4xl font-black text-[#FF4F7A] mb-2 leading-tight">Mochi<br>Battle!</h2>
            <p class="text-[#5D4037] font-bold mb-8 text-sm">Main bareng ayang, adu ketangkasan mencet mochi!</p>
            
            <button onclick="createRoom()" class="w-full mb-4 bg-[#FF4F7A] text-white font-black text-lg py-4 rounded-2xl shadow-[0_6px_0_#D81B60] active:translate-y-[6px] active:shadow-none transition-all flex justify-center items-center gap-2">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Buat Ruangan
            </button>
            
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t-2 border-[#FFE4E1]"></div>
                <span class="flex-shrink-0 mx-4 text-[#FFB5E8] font-black text-sm">ATAU</span>
                <div class="flex-grow border-t-2 border-[#FFE4E1]"></div>
            </div>

            <div class="mt-4">
                <input type="text" id="room-input" placeholder="Kode Ruangan" class="w-full text-center text-2xl font-black text-[#FF4F7A] bg-[#FFF0F5] border-4 border-[#FFC9DE] rounded-2xl py-3 mb-4 outline-none placeholder:text-[#FFB5E8]" maxlength="4">
                
                <button onclick="joinRoom()" class="w-full bg-white text-[#FF4F7A] font-black text-lg py-4 rounded-2xl border-4 border-[#FFC9DE] shadow-[0_6px_0_#FFC9DE] active:translate-y-[6px] active:shadow-none transition-all flex justify-center items-center gap-2">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                    Gabung Ruangan
                </button>
            </div>
            
            <p id="menu-error" class="text-red-500 font-bold mt-4 hidden text-sm bg-red-50 py-2 rounded-xl border border-red-200"></p>
        </div>
    </div>

    <!-- WAITING ROOM -->
    <div id="waiting-screen" class="absolute inset-0 bg-[#FFB5E8]/90 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-[35px] shadow-2xl text-center max-w-[100%] w-[340px] pop-in border-[6px] border-white relative">
            <h2 class="text-2xl font-black text-[#FF4F7A] mb-4">Ruangan Dibuat!</h2>
            <p class="text-[#5D4037] font-bold mb-2">Berikan kode ini ke lawanmu:</p>
            
            <div class="bg-[#FFF0F5] border-4 border-[#FFC9DE] rounded-2xl py-4 mb-6">
                <span id="room-code-display" class="text-5xl font-black text-[#FF4F7A] tracking-widest">0000</span>
            </div>

            <div class="flex flex-col items-center justify-center gap-3">
                <div class="loader"></div>
                <p class="text-[#FF70A6] font-bold text-sm animate-pulse">Menunggu lawan masuk...</p>
            </div>
        </div>
    </div>

    <!-- COUNTDOWN SCREEN -->
    <div id="countdown-screen" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <span id="countdown-text" class="text-[120px] font-black text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]">3</span>
    </div>

    <!-- MODAL SELESAI -->
    <div id="end-screen" class="absolute inset-0 bg-[#FFB5E8]/90 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden p-4">
        <div class="bg-white p-6 rounded-[35px] shadow-2xl text-center max-w-[100%] w-[340px] pop-in border-[6px] border-white relative">
            
            <div class="w-16 h-16 mx-auto mb-2 text-[#FF4F7A]" id="end-icon">
                <!-- Diisi via JS -->
            </div>

            <h2 class="text-3xl font-black mb-2 text-[#FF4F7A]" id="end-title">Waktu Habis!</h2>
            <p class="text-[#5D4037] font-bold mb-6 text-sm" id="end-message">Permainan Selesai</p>
            
            <div class="flex gap-3 mb-6">
                <div class="flex-1 bg-[#FFF0F5] rounded-2xl p-3 border-4 border-[#FFC9DE] relative overflow-hidden">
                    <p class="text-[10px] font-black text-[#FF70A6] uppercase relative z-10">Skormu</p>
                    <p id="final-my-score" class="text-3xl font-black text-[#FF4F7A] relative z-10">0</p>
                </div>
                <div class="flex-1 bg-white rounded-2xl p-3 border-4 border-[#FFC9DE] relative">
                    <p class="text-[10px] font-black text-[#FF70A6] uppercase relative z-10">Lawan</p>
                    <p id="final-opp-score" class="text-3xl font-black text-[#FF70A6] relative z-10">0</p>
                </div>
            </div>

            <button onclick="backToMenu()" class="w-full bg-[#FF4F7A] text-white font-black text-xl py-4 rounded-2xl shadow-[0_6px_0_#D81B60] active:translate-y-[6px] active:shadow-none transition-all flex justify-center items-center gap-2">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Kembali ke Menu
            </button>
        </div>
    </div>

</div>

<script>
    // --- SETUP ABLY REALTIME ---
    const ably = new Ably.Realtime('4opURQ.FVPiqg:z5W8zQxWoBNlXmlAXvOv4Bz1bmn_ISnFucJGpjFijS8');
    let channel = null;
    let myClientId = Math.random().toString(36).substring(2, 9);
    let isHost = false;
    let roomCode = "";

    // --- DATABASE MOCHI ---
    const MOCHI_TYPES = {
        pink: { 
            points: 10, prob: 0.7, 
            svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="42" ry="38" fill="#FFB5E8"/><ellipse cx="30" cy="30" rx="12" ry="6" fill="#FFF" opacity="0.5" transform="rotate(-20 30 30)"/><circle cx="35" cy="55" r="4.5" fill="#5D4037"/><circle cx="65" cy="55" r="4.5" fill="#5D4037"/><ellipse cx="22" cy="62" rx="7" ry="4" fill="#FF4F7A" opacity="0.4"/><ellipse cx="78" cy="62" rx="7" ry="4" fill="#FF4F7A" opacity="0.4"/><path d="M 45 60 Q 50 66 55 60" stroke="#5D4037" stroke-width="3" fill="transparent" stroke-linecap="round"/></svg>` 
        },
        gold: { 
            points: 30, prob: 0.15, 
            svg: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="55" rx="42" ry="38" fill="#FCD34D"/><ellipse cx="30" cy="30" rx="12" ry="6" fill="#FFF" opacity="0.6" transform="rotate(-20 30 30)"/><path d="M 35 25 L 40 10 L 50 20 L 60 10 L 65 25 Z" fill="#F59E0B"/><path d="M 30 55 Q 35 50 40 55" stroke="#5D4037" stroke-width="4" fill="transparent" stroke-linecap="round"/><path d="M 60 55 Q 65 50 70 55" stroke="#5D4037" stroke-width="4" fill="transparent" stroke-linecap="round"/><ellipse cx="22" cy="62" rx="7" ry="4" fill="#FF4F7A" opacity="0.4"/><ellipse cx="78" cy="62" rx="7" ry="4" fill="#FF4F7A" opacity="0.4"/><path d="M 45 60 Q 50 70 55 60 Z" fill="#FF4F7A"/></svg>` 
        },
        bad: { 
            points: -15, prob: 0.15, 
            svg: `<svg viewBox="0 0 100 100"><path d="M 15 55 Q 10 30 50 20 Q 90 30 85 55 Q 90 90 50 90 Q 10 90 15 55" fill="#94A3B8"/><ellipse cx="30" cy="30" rx="10" ry="5" fill="#FFF" opacity="0.3" transform="rotate(-20 30 30)"/><path d="M 28 48 L 40 52" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/><path d="M 72 48 L 60 52" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/><circle cx="35" cy="58" r="4" fill="#1E293B"/><circle cx="65" cy="58" r="4" fill="#1E293B"/><path d="M 45 68 Q 50 63 55 68" stroke="#1E293B" stroke-width="3" fill="transparent" stroke-linecap="round"/></svg>` 
        }
    };

    // SVGs for End Screen
    const SVG_CROWN = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="2 20 22 20 18 4 12 10 6 4 2 20"></polygon></svg>`;
    const SVG_HEART = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;
    const SVG_SAD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="9" x2="10" y2="11"></line><line x1="16" y1="9" x2="14" y2="11"></line><path d="M16 16c-1.5-2-6.5-2-8 0"></path></svg>`;

    // --- VARIABEL GAME ---
    let myScore = 0;
    let oppScore = 0;
    let timeLeft = 30; 
    let isPlaying = false;
    let timerInterval;
    let popupInterval;
    
    // Combo System
    let combo = 0;
    let comboMultiplier = 1;

    let holeStates = Array(9).fill(false); 
    let holeTypes = Array(9).fill(null); // Track type to break combo if good mochi missed
    let holeTimers = Array(9).fill(null); 

    // DOM Papan
    const trayEl = document.getElementById('tray');
    const holes = [];
    for (let i = 0; i < 9; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole';
        hole.innerHTML = `<div class="bowl-back"></div><div class="mochi-wrapper" id="mochi-${i}" data-index="${i}"></div><div class="bowl-front"></div>`;
        trayEl.appendChild(hole);
        holes.push(document.getElementById(`mochi-${i}`));
    }

    // --- FUNGSI MULTIPLAYER LOBBY ---
    function showError(msg) {
        const errEl = document.getElementById('menu-error');
        errEl.innerText = msg;
        errEl.classList.remove('hidden');
    }

    function createRoom() {
        isHost = true;
        roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('room-code-display').innerText = roomCode;
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('waiting-screen').classList.remove('hidden');

        setupChannel(roomCode);
    }

    function joinRoom() {
        const code = document.getElementById('room-input').value;
        if (code.length !== 4) {
            showError("Kode harus 4 angka ya!");
            return;
        }
        isHost = false;
        roomCode = code;
        setupChannel(roomCode);
        
        channel.publish('player_joined', { id: myClientId });
    }

    function setupChannel(code) {
        channel = ably.channels.get(`mochi-room-${code}`);
        
        channel.subscribe((msg) => {
            const data = msg.data;
            const name = msg.name;

            if (name === 'player_joined' && isHost) {
                channel.publish('start_countdown', {});
            }
            
            if (name === 'start_countdown') {
                runCountdown();
            }

            if (name === 'spawn' && isPlaying) {
                renderMochi(data.holeIdx, data.type);
            }

            if (name === 'hit' && isPlaying) {
                processHit(data.holeIdx, data.playerId, data.type, data.basePoints);
            }
        });
    }

    function backToMenu() {
        if(channel) channel.detach();
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('game-board').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
    }

    // --- HITUNGAN MUNDUR ---
    function runCountdown() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('waiting-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('game-board').classList.remove('hidden');
        
        const countScreen = document.getElementById('countdown-screen');
        const countText = document.getElementById('countdown-text');
        countScreen.classList.remove('hidden');
        
        let count = 3;
        countText.innerText = count;
        countText.classList.add('pop-in');

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countText.classList.remove('pop-in');
                void countText.offsetWidth; // trigger reflow
                countText.innerText = count;
                countText.classList.add('pop-in');
            } else if (count === 0) {
                countText.innerText = "MULAI!";
            } else {
                clearInterval(interval);
                countScreen.classList.add('hidden');
                startActualGame();
            }
        }, 1000);
    }

    // --- FUNGSI GAMEPLAY ---
    function startActualGame() {
        myScore = 0; oppScore = 0; timeLeft = 30; isPlaying = true;
        combo = 0; comboMultiplier = 1; updateComboUI();
        holeStates.fill(false);
        holeTypes.fill(null);
        
        holes.forEach(h => { h.classList.remove('up', 'squished'); h.innerHTML = ''; });
        updateScoreUI();
        document.getElementById('time').innerText = `${timeLeft}s`;

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = `${timeLeft}s`;
            if (timeLeft <= 0) endGame();
        }, 1000);

        if (isHost) {
            runHostPopLoop();
        }
    }

    function runHostPopLoop() {
        if (!isPlaying) return;

        let speed = timeLeft > 15 ? 700 : 500;
        let popCount = (timeLeft < 15 && Math.random() > 0.5) ? 2 : 1;

        for(let i=0; i<popCount; i++) {
            const emptyIndices = holeStates.map((val, idx) => val ? -1 : idx).filter(val => val !== -1);
            if (emptyIndices.length > 0) {
                const randomIdx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                
                const rand = Math.random();
                let typeKey = 'pink';
                if (rand < MOCHI_TYPES.gold.prob) typeKey = 'gold';
                else if (rand < MOCHI_TYPES.gold.prob + MOCHI_TYPES.bad.prob) typeKey = 'bad';

                channel.publish('spawn', { holeIdx: randomIdx, type: typeKey });
            }
        }
        popupInterval = setTimeout(runHostPopLoop, speed);
    }

    function renderMochi(idx, typeKey) {
        if (!isPlaying) return;
        const holeEl = holes[idx];
        const typeObj = MOCHI_TYPES[typeKey];

        holeStates[idx] = true;
        holeTypes[idx] = typeKey;
        holeEl.innerHTML = typeObj.svg;
        holeEl.classList.remove('squished');
        
        holeEl.onclick = (e) => trySquish(e, idx, typeKey, typeObj.points);
        holeEl.ontouchstart = (e) => { e.preventDefault(); trySquish(e, idx, typeKey, typeObj.points); };

        setTimeout(() => holeEl.classList.add('up'), 20);

        const stayTime = typeKey === 'gold' ? 800 : (typeKey === 'bad' ? 1200 : 1000);
        
        // Timer for auto hide
        clearTimeout(holeTimers[idx]);
        holeTimers[idx] = setTimeout(() => {
            if (holeStates[idx]) {
                holeEl.classList.remove('up');
                holeStates[idx] = false;
                
                // Break combo if missed a good mochi
                if (holeTypes[idx] !== 'bad') {
                    resetCombo();
                }
            }
        }, stayTime);
    }

    function trySquish(e, idx, typeKey, basePoints) {
        if (!isPlaying || !holeStates[idx]) return;

        // Visual feedback immediately
        const holeEl = holes[idx];
        holeEl.classList.add('squished');
        
        // Particle effect if Gold
        if(typeKey === 'gold') {
            const rect = holeEl.getBoundingClientRect();
            spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2);
        }

        channel.publish('hit', { holeIdx: idx, playerId: myClientId, type: typeKey, basePoints: basePoints });
        
        let pointsEarned = basePoints;
        
        if (typeKey === 'bad') {
            triggerScreenShake();
            resetCombo();
        } else {
            combo++;
            comboMultiplier = Math.min(3, 1 + Math.floor(combo / 5)); // Max x3
            pointsEarned = basePoints * comboMultiplier;
            updateComboUI();
        }

        showFloatingText(e, pointsEarned, true, typeKey);
    }

    function processHit(idx, pId, typeKey, basePoints) {
        if (!holeStates[idx]) return; 
        
        holeStates[idx] = false; 
        clearTimeout(holeTimers[idx]);

        const holeEl = holes[idx];
        holeEl.classList.add('squished');
        setTimeout(() => holeEl.classList.remove('up'), 150);

        if (pId === myClientId) {
            let pts = typeKey === 'bad' ? basePoints : basePoints * comboMultiplier;
            myScore += pts;
            if(myScore < 0) myScore = 0;
        } else {
            oppScore += basePoints; // Opponent points logic is simplified for local view
            if(oppScore < 0) oppScore = 0;
            
            const rect = holeEl.getBoundingClientRect();
            showFloatingText({ clientX: rect.left + rect.width/2, clientY: rect.top }, basePoints, false, typeKey);
        }

        updateScoreUI();
    }

    // --- EFEK & UI UPDATE ---
    function triggerScreenShake() {
        const container = document.getElementById('game-container');
        container.classList.add('shake-screen');
        setTimeout(() => container.classList.remove('shake-screen'), 300);
    }

    function resetCombo() {
        combo = 0;
        comboMultiplier = 1;
        updateComboUI();
    }

    function updateComboUI() {
        const comboEl = document.getElementById('combo-display');
        const countEl = document.getElementById('combo-count');
        
        if (combo >= 2) {
            comboEl.style.opacity = '1';
            countEl.innerText = comboMultiplier;
            
            // Re-trigger animation
            comboEl.classList.remove('combo-text');
            void comboEl.offsetWidth;
            comboEl.classList.add('combo-text');
        } else {
            comboEl.style.opacity = '0';
        }
    }

    function updateScoreUI() {
        document.getElementById('my-score').innerText = myScore;
        document.getElementById('opp-score').innerText = oppScore;
        
        const myScoreEl = document.getElementById('my-score-box');
        myScoreEl.style.transform = 'scale(1.1)';
        setTimeout(() => myScoreEl.style.transform = 'scale(1)', 150);
        
        const oppScoreEl = document.getElementById('opp-score-box');
        oppScoreEl.style.transform = 'scale(1.05)';
        setTimeout(() => oppScoreEl.style.transform = 'scale(1)', 150);
    }

    function showFloatingText(e, points, isMine, typeKey) {
        const text = document.createElement('div');
        text.className = 'floating-text';
        text.innerText = points > 0 ? `+${points}` : points;
        
        if (typeKey === 'gold') text.style.color = '#F59E0B'; 
        else if (typeKey === 'bad') text.style.color = '#64748B';
        else text.style.color = isMine ? '#FF4F7A' : '#F472B6'; 
        
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);

        text.style.left = `${x - 20}px`;
        text.style.top = `${y - 30}px`;
        document.body.appendChild(text);

        setTimeout(() => text.remove(), 800);
    }

    function spawnParticles(x, y) {
        const tray = document.getElementById('tray');
        for(let i=0; i<8; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = `${x - 4}px`;
            p.style.top = `${y - 4}px`;
            
            const angle = (Math.PI * 2 / 8) * i;
            const distance = 40 + Math.random() * 20;
            p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
            p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
            
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }
    }

    function endGame() {
        isPlaying = false;
        clearInterval(timerInterval);
        clearTimeout(popupInterval);
        
        holes.forEach(h => h.classList.remove('up'));

        document.getElementById('final-my-score').innerText = myScore;
        document.getElementById('final-opp-score').innerText = oppScore;
        
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-message');
        const icon = document.getElementById('end-icon');

        if (myScore > oppScore) {
            icon.innerHTML = SVG_CROWN;
            title.innerText = "Kamu Menang!";
            title.style.color = '#FF4F7A';
            msg.innerText = "Tangan kamu lebih lincah dan cepat!";
        } else if (myScore < oppScore) {
            icon.innerHTML = SVG_SAD;
            icon.style.color = '#64748B';
            title.innerText = "Kalah Cepat";
            title.style.color = '#64748B';
            msg.innerText = "Tidak apa-apa, kamu bisa coba lagi nanti.";
        } else {
            icon.innerHTML = SVG_HEART;
            icon.style.color = '#F59E0B';
            title.innerText = "Seri Sempurna!";
            title.style.color = '#F59E0B';
            msg.innerText = "Luar biasa, skor kalian bisa sama persis!";
        }

        setTimeout(() => {
            document.getElementById('end-screen').classList.remove('hidden');
        }, 1000);
    }

</script>
