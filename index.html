
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pokemon Master TCG & Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=VT323&family=Oswald:wght@500;700&display=swap');

        body, html {
            height: 100%; margin: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #f8fafc; color: #1e293b;
            overflow: hidden; touch-action: none; 
            user-select: none; -webkit-user-select: none;
        }

        .pixel-text { font-family: 'VT323', monospace; }
        .tcg-text { font-family: 'Oswald', sans-serif; }

        /* --- DRAFT PICK UI (FLEX BOX RESPONSIVE) --- */
        #draft-screen { display: flex; flex-direction: column; height: 100%; width: 100%; }

        /* Deck Area (Horizontal Scroll) */
        .deck-area {
            flex: none; height: 130px; 
            display: flex; gap: 0.5rem; padding: 0.5rem;
            overflow-x: auto; overflow-y: hidden;
            background: #f1f5f9; border-top: 2px solid #cbd5e1; border-bottom: 2px solid #cbd5e1;
            scroll-behavior: smooth;
        }
        .deck-area::-webkit-scrollbar { height: 4px; }
        .deck-area::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }

        /* TCG Cards */
        .tcg-grid {
            flex: 1; min-h-0; /* Rahasia scroll aman */
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
            padding: 0.5rem; overflow-y: auto; background: #fff;
        }
        .tcg-grid::-webkit-scrollbar { width: 0px; }

        .tcg-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); 
            border: 2px solid #cbd5e1; border-radius: 0.5rem;
            display: flex; flex-direction: column; padding: 0.25rem;
            transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content; min-width: 90px;
        }
        .tcg-card:active { transform: scale(0.95); }

        .tcg-img-wrapper {
            width: 100%; height: 50px; background: #f1f5f9; border-radius: 0.25rem; 
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 0.25rem; border: 1px solid #e2e8f0;
        }
        .tcg-img-wrapper img { width: 90%; height: 90%; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
        
        .tcg-stats { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px; 
            font-size: 0.5rem; font-weight: 800; text-align: center; 
            background: #cbd5e1; border: 1px solid #cbd5e1; border-radius: 2px; overflow: hidden;
        }
        .tcg-stats div { background: #fff; padding: 1px 0; }
        .s-hp { color: #059669; } .s-atk { color: #e11d48; } .s-def { color: #2563eb; }
        .s-spa { color: #be123c; } .s-spd { color: #1d4ed8; } .s-spe { color: #d97706; }

        /* --- BATTLE ARENA --- */
        .arena-bg {
            background: linear-gradient(to bottom, #dbeafe 0%, #e0f2fe 40%, #bbf7d0 60%, #86efac 100%);
            border-radius: 0.5rem; border: 4px solid #475569;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        .sprite-container {
            position: absolute; bottom: 5px; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            z-index: 40;
        }
        .p1-pos { left: 15%; }
        .p2-pos { right: 15%; }

        .floating-hp {
            width: 60px; background: #1e293b; padding: 2px; border-radius: 4px;
            border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 5px; z-index: 50; position: relative;
        }
        .floating-hp-fill { height: 4px; border-radius: 2px; transition: width 0.3s ease; background-color: #10b981; }

        .monster-sprite { 
            image-rendering: pixelated; transition: opacity 0.2s ease; 
            height: 90px; object-fit: contain; z-index: 40; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }
        .sprite-p1 { transform: scaleX(-1); } 
        .sprite-p2 { transform: scaleX(1); }  

        .ground-shadow {
            width: 60px; height: 12px; background: rgba(0,0,0,0.3);
            border-radius: 50%; position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%); z-index: 30; filter: blur(2px);
        }

        .attack-lunge-p1 { animation: lunge-r 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .attack-lunge-p2 { animation: lunge-l 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes lunge-r { 0%, 100% { transform: scaleX(-1) translateX(0); } 50% { transform: scaleX(-1) translateX(-30px); } }
        @keyframes lunge-l { 0%, 100% { transform: scaleX(1) translateX(0); } 50% { transform: scaleX(1) translateX(-30px); } }
        
        .hit-flash { animation: hit 0.4s ease; }
        @keyframes hit { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(2) opacity(0.5); transform: translateX(5px); } }

        /* Epic Move Name */
        .epic-move-text {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'VT323', monospace; font-size: 2.5rem; color: #fff;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000;
            white-space: nowrap; z-index: 60; opacity: 0; pointer-events: none;
        }
        .show-move { animation: slashMove 1.5s ease-out; }
        @keyframes slashMove {
            0% { transform: translate(-100%, -50%) skewX(-20deg); opacity: 0; }
            15% { transform: translate(-50%, -50%) skewX(0deg); opacity: 1; }
            85% { transform: translate(-50%, -50%) skewX(0deg); opacity: 1; }
            100% { transform: translate(100%, -50%) skewX(20deg); opacity: 0; }
        }

        /* --- PUZZLE BOARD (6x6) --- */
        .game-board-container {
            width: 100%; aspect-ratio: 1 / 1; position: relative;
            background: #fff; border-radius: 0.5rem; border: 4px solid #475569;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; touch-action: none;
        }
        
        .gem { position: absolute; width: 16.666%; height: 16.666%; display: flex; justify-content: center; align-items: center; transition: top 0.2s, left 0.2s, transform 0.1s; z-index: 10; pointer-events: none; }
        .gem img { width: 85%; height: 85%; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15)); }
        .gem.swiping { transform: scale(1.15); z-index: 20; filter: brightness(1.2); }
        .gem.popping { transform: scale(0); opacity: 0; transition: all 0.2s; }
        
        .floating-dmg { position: absolute; font-family: 'VT323', monospace; font-size: 2.5rem; color: #e11d48; text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff; pointer-events: none; z-index: 50; animation: floatUp 0.8s forwards ease-out; }
        .floating-crit { font-size: 3.5rem; color: #f59e0b; text-shadow: 3px 3px 0 #b45309, -1px -1px 0 #fff; z-index: 55; }
        @keyframes floatUp { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -80%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -120px) scale(1); opacity: 0; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative max-w-md mx-auto">

    <!-- 1. LOBBY -->
    <div id="lobby-screen" class="fixed inset-0 bg-slate-100 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-white border-4 border-slate-300 w-full p-8 rounded-2xl text-center shadow-lg">
            <h1 class="text-4xl font-black text-slate-800 mb-6 uppercase leading-tight">Master<br><span class="text-sky-500">Battle</span></h1>
            
            <div id="lobby-actions" class="space-y-4">
                <div class="p-3 bg-sky-50 border-2 border-sky-200 rounded-xl">
                    <button onclick="createRoom()" class="w-full py-3 bg-sky-500 hover:bg-sky-600 text-white rounded-lg font-black active:scale-95 transition-transform">BUAT ROOM</button>
                </div>
                <div class="flex items-center space-x-2"><hr class="flex-1 border-slate-300"><span class="text-[10px] font-black text-slate-400">ATAU</span><hr class="flex-1 border-slate-300"></div>
                <div class="p-3 bg-rose-50 border-2 border-rose-200 rounded-xl">
                    <input type="text" id="room-code-input" placeholder="KODE 4 DIGIT" maxlength="4" class="w-full p-2 border-2 border-slate-300 rounded-lg mb-2 text-center text-xl font-black uppercase outline-none focus:border-rose-400">
                    <button onclick="joinRoom()" class="w-full py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-lg font-black active:scale-95 transition-transform">GABUNG ROOM</button>
                </div>
            </div>

            <div id="lobby-waiting" class="hidden mt-2">
                <p class="text-lg font-bold text-slate-700 mb-1">Kode Room:</p>
                <h2 id="display-room-code" class="text-6xl font-black text-sky-500 tracking-widest bg-slate-100 py-2 rounded-lg border border-slate-200 mb-4">ABCD</h2>
                <p class="text-sm text-slate-500 font-bold animate-pulse">Menunggu lawan bergabung...</p>
            </div>
            <p id="lobby-status" class="text-sm font-bold text-rose-500 mt-4 h-5"></p>
        </div>
    </div>

    <!-- 2. DRAFT PICK TCG -->
    <div id="draft-screen" class="fixed inset-0 bg-slate-50 z-40 hidden flex-col">
        
        <!-- Header Turn -->
        <div class="flex-none p-3 text-center bg-white border-b-2 border-slate-200 shadow-sm z-10">
            <h2 id="draft-turn-text" class="text-xl font-black uppercase text-slate-400">MEMUAT KARTU...</h2>
        </div>

        <!-- Lawan Deck (Atas) -->
        <div class="flex-none bg-rose-50 p-2 border-b-2 border-rose-200">
            <div class="flex justify-between px-1 mb-1"><span class="text-[11px] font-black text-rose-500">DECK LAWAN</span><span id="p2-count" class="text-[11px] font-bold text-slate-400">0/5</span></div>
            <div class="deck-area" id="p2-deck-slots">
                <!-- Kartu musuh akan pindah kesini -->
            </div>
        </div>

        <!-- Pool Kartu (Tengah) -->
        <div id="pool-grid" class="tcg-grid"></div>

        <!-- Pemain Deck (Bawah) -->
        <div class="flex-none bg-sky-50 p-2 border-t-2 border-sky-200">
            <div class="flex justify-between px-1 mb-1"><span class="text-[11px] font-black text-sky-500">DECK KAMU</span><span id="p1-count" class="text-[11px] font-bold text-slate-400">0/5</span></div>
            <div class="deck-area mb-2" id="p1-deck-slots">
                <!-- Kartu kita akan pindah kesini -->
            </div>
            <div id="draft-wait-btn" class="w-full py-3 bg-slate-300 text-white text-center rounded-xl font-black">MENUNGGU GILIRAN...</div>
        </div>
    </div>

    <!-- 3. BATTLE ARENA (6x6) -->
    <div id="game-container" class="fixed inset-0 bg-slate-100 z-30 flex flex-col p-3 hidden justify-between">
        
        <!-- Arena -->
        <div class="flex-none arena-bg w-full h-[190px] mb-2">
            <div id="epic-move" class="epic-move-text">FLAMETHROWER!</div>

            <!-- Musuh -->
            <div class="sprite-container p2-pos" id="p2-container">
                <div class="text-[10px] font-black text-slate-800 bg-white/80 px-2 rounded-t-md border-x border-t border-slate-400 mb-[-2px] z-10 uppercase" id="enemy-name">ENEMY</div>
                <div class="floating-hp" id="enemy-hp-box">
                    <div id="enemy-hp-bar" class="floating-hp-fill" style="width:100%"></div>
                </div>
                <div class="relative">
                    <img id="p2-sprite" src="" class="monster-sprite sprite-p2" alt="Enemy">
                    <div class="ground-shadow"></div>
                </div>
            </div>

            <!-- Player -->
            <div class="sprite-container p1-pos" id="p1-container">
                <div class="text-[10px] font-black text-slate-800 bg-white/80 px-2 rounded-t-md border-x border-t border-slate-400 mb-[-2px] z-10 uppercase" id="player-name">PLAYER</div>
                <div class="floating-hp" id="player-hp-box">
                    <div id="player-hp-bar" class="floating-hp-fill" style="width:100%"></div>
                </div>
                <div class="relative">
                    <img id="p1-sprite" src="" class="monster-sprite sprite-p1" alt="Player">
                    <div class="ground-shadow"></div>
                </div>
            </div>
        </div>

        <!-- Battle Log -->
        <div class="flex-none w-full bg-white border-4 border-slate-400 rounded-lg p-2 mb-3 shadow-sm flex items-center min-h-[45px]">
            <span id="log-text" class="pixel-text text-2xl font-bold text-slate-800 leading-none">Pertarungan dimulai!</span>
        </div>

        <!-- Papan Puzzle -->
        <div class="flex-1 w-full max-w-sm mx-auto flex justify-center mb-2">
            <div id="board" class="game-board-container">
                <div id="gems-container" class="absolute inset-0"></div>
                <div id="board-lock" class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px] z-50 flex items-center justify-center hidden">
                    <span class="bg-white text-slate-800 px-6 py-3 border-4 border-slate-400 rounded-xl font-black uppercase shadow-lg text-lg tracking-widest">MENUNGGU LAWAN</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. MODAL RESULT -->
    <div id="game-over" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl text-center max-w-sm w-[90%] border-4 border-slate-300">
            <h2 id="result-title" class="text-6xl font-black mb-2"></h2>
            <p id="result-subtitle" class="text-slate-500 font-bold mb-8 text-lg"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-sky-500 hover:bg-sky-600 rounded-xl font-black text-white active:scale-95 shadow-lg">MAIN LAGI</button>
        </div>
    </div>

<script>
    // --- CONFIG ---
    const ROWS = 6; const COLS = 6; const POOL_SIZE = 15;
    
    const getAnim = (id) => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${id}.gif`;
    const getStatic = (id) => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

    // --- ABLY ---
    const ably = new Ably.Realtime('4opURQ.FVPiqg:z5W8zQxWoBNlXmlAXvOv4Bz1bmn_ISnFucJGpjFijS8');
    let channel; let myRole = ''; let myTurnId = ''; 

    let poolData = []; let typeRels = {}; 
    let myTeam = []; let oppTeam = [];
    let draftTurn = 'p1';
    
    let board = [];
    let state = { turn: 'p1', isAnim: false, myActive: 0, oppActive: 0 };

    // --- AUDIO ---
    let actx;
    function initA() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === 'suspended') actx.resume(); }
    function pT(f, t='sine', d=0.1, v=0.05) { if(!actx)return; let o=actx.createOscillator(), g=actx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(v, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+d); o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+d); }
    function sHit(crit) { if(crit){ pT(800,'square',0.1,0.08); setTimeout(()=>pT(1000,'square',0.2,0.08),50); } else { pT(400,'square',0.1,0.05); setTimeout(()=>pT(600,'square',0.15,0.05),50); } }
    function sFaint() { pT(150, 'sawtooth', 0.4, 0.1); setTimeout(()=>pT(100, 'sawtooth', 0.4, 0.1), 150); }
    function sEpic() { pT(900, 'triangle', 0.2, 0.05); setTimeout(()=>pT(1200, 'sine', 0.3, 0.05), 100); }

    function setStat(msg) { document.getElementById('lobby-status').innerText = msg; }

    // ==========================================
    // 1. LOBBY (ANTI-STUCK FIX)
    // ==========================================
    async function createRoom() {
        initA(); const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        myRole = 'host'; myTurnId = 'p1';
        document.getElementById('lobby-actions').classList.add('hidden'); document.getElementById('lobby-waiting').classList.remove('hidden'); document.getElementById('display-room-code').innerText = code;
        setStat('Membuat Room...');
        
        channel = ably.channels.get(`room-${code}`);
        channel.subscribe('join', async (msg) => {
            setStat('Lawan join! Mengunduh 15 Pokemon Lengkap...');
            await fetchPool();
            channel.publish('game-start', { pool: poolData, types: typeRels });
            startDraft();
        });
    }

    function joinRoom() {
        initA(); const code = document.getElementById('room-code-input').value.toUpperCase();
        if(code.length !== 4) return setStat("Kode 4 digit!");
        myRole = 'guest'; myTurnId = 'p2';
        setStat('Mencari Room...');
        
        channel = ably.channels.get(`room-${code}`);
        // Penting: Guest subscribe DULU, baru publish join agar tidak kelewatan pesan Host
        channel.subscribe('game-start', (msg) => { poolData = msg.data.pool; typeRels = msg.data.types; startDraft(); });
        setTimeout(() => channel.publish('join', { id: 'guest' }), 500);
    }

    // ==========================================
    // 2. FETCH POKEAPI (LENGKAP 6 STATS)
    // ==========================================
    async function fetchPool() {
        let ids = new Set();
        while(ids.size < POOL_SIZE) ids.add(Math.floor(Math.random() * 493) + 1); // Gen 1-4
        
        const promises = Array.from(ids).map(id => fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json()));
        const res = await Promise.all(promises);
        
        let typesToFetch = new Set();
        
        poolData = res.map(d => {
            const bHp = d.stats.find(s=>s.stat.name==='hp').base_stat;
            const bAtk = d.stats.find(s=>s.stat.name==='attack').base_stat;
            const bDef = d.stats.find(s=>s.stat.name==='defense').base_stat;
            const bSpa = d.stats.find(s=>s.stat.name==='special-attack').base_stat;
            const bSpd = d.stats.find(s=>s.stat.name==='special-defense').base_stat;
            const bSpe = d.stats.find(s=>s.stat.name==='speed').base_stat;
            
            typesToFetch.add(d.types[0].type.name);

            return {
                id: d.id, name: d.name, type: d.types[0].type.name,
                maxHp: Math.floor(bHp * 2) + 50, hp: Math.floor(bHp * 2) + 50,
                atk: Math.floor(bAtk * 1.5), def: Math.floor(bDef * 1.5),
                spa: Math.floor(bSpa * 1.5), spd: Math.floor(bSpd * 1.5), spe: Math.floor(bSpe * 1.5),
                spriteS: getStatic(d.id), spriteA: getAnim(d.id),
                rawMoves: d.moves, learnedMove: null
            };
        });

        const tProm = Array.from(typesToFetch).map(t => fetch(`https://pokeapi.co/api/v2/type/${t}`).then(r=>r.json()));
        const tRes = await Promise.all(tProm);
        tRes.forEach(d => {
            typeRels[d.name] = { double: d.damage_relations.double_damage_to.map(t=>t.name), half: d.damage_relations.half_damage_to.map(t=>t.name), zero: d.damage_relations.no_damage_to.map(t=>t.name) };
        });
    }

    // Lazy Fetch Attack (Ambil tipe damagenya: physical/special)
    async function fetchAttackMove(movesList) {
        for(let i=0; i<4; i++) {
            let rand = movesList[Math.floor(Math.random() * movesList.length)].move;
            try {
                let res = await fetch(rand.url); let data = await res.json();
                if(data.power > 0) return { name: data.name, power: data.power, class: data.damage_class.name }; // physical atau special
            } catch(e) {}
        }
        return { name: 'tackle', power: 40, class: 'physical' }; 
    }

    // ==========================================
    // 3. DRAFT PICK (PINDAH KARTU SEUTUHNYA)
    // ==========================================
    function startDraft() {
        document.getElementById('lobby-screen').classList.add('hidden'); document.getElementById('draft-screen').classList.remove('hidden');
        renderPool(); updateDraftUI();

        channel.subscribe('pick', (msg) => {
            const { pTurn, pIdx } = msg.data;
            if(pTurn !== myTurnId) {
                const poke = poolData[pIdx]; oppTeam.push(poke);
                
                // Pindah kartu ke Deck Lawan
                const card = document.getElementById(`card-${pIdx}`);
                document.getElementById('p2-deck-slots').appendChild(card);
                card.style.pointerEvents = 'none'; card.style.opacity = '0.8';
                
                document.getElementById('p2-count').innerText = `${oppTeam.length}/5`;
                draftTurn = myTurnId; updateDraftUI(); pT(600); checkDraftDone();
            }
        });
    }

    function renderPool() {
        const grid = document.getElementById('pool-grid'); grid.innerHTML = '';
        poolData.forEach((p, i) => {
            const card = document.createElement('div'); card.className = 'tcg-card'; card.id = `card-${i}`;
            card.onclick = () => doPick(i, card);
            card.innerHTML = `
                <div class="flex justify-between items-center mb-1"><span class="text-[9px] font-black uppercase truncate">${p.name}</span><span class="text-[7px] font-bold text-white px-1 rounded-sm tcg-text" style="background:${TYPE_COLORS[p.type]||'#777'}">${p.type.substring(0,3)}</span></div>
                <div class="tcg-img-wrapper"><img src="${p.spriteS}"></div>
                <div class="tcg-stats">
                    <div class="s-hp">HP ${p.maxHp}</div><div class="s-atk">AT ${p.atk}</div>
                    <div class="s-def">DF ${p.def}</div><div class="s-spa">SA ${p.spa}</div>
                    <div class="s-spd">SD ${p.spd}</div><div class="s-spe">SP ${p.spe}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function doPick(idx, cardEl) {
        if(draftTurn !== myTurnId || myTeam.length >= 5) return;
        const poke = poolData[idx];
        if(myTeam.some(t=>t.id===poke.id) || oppTeam.some(t=>t.id===poke.id)) return;

        pT(600); myTeam.push(poke);
        
        // PINDAHKAN KARTU KE DECK KITA
        document.getElementById('p1-deck-slots').appendChild(cardEl);
        cardEl.style.pointerEvents = 'none'; cardEl.style.borderColor = '#0ea5e9';
        
        document.getElementById('p1-count').innerText = `${myTeam.length}/5`;
        
        draftTurn = myTurnId === 'p1' ? 'p2' : 'p1'; updateDraftUI();
        channel.publish('pick', { pTurn: myTurnId, pIdx: idx });
        checkDraftDone();
    }

    function updateDraftUI() {
        const txt = document.getElementById('draft-turn-text'); const btn = document.getElementById('draft-wait-btn');
        if(draftTurn === myTurnId) {
            txt.innerText = "GILIRANMU MEMILIH KARTU"; txt.className = "text-2xl font-black uppercase text-sky-500";
            btn.innerText = "PILIH KARTU DARI TENGAH"; btn.className = "w-full py-3 bg-sky-100 text-sky-600 border-2 border-sky-300 rounded-xl font-black";
        } else {
            txt.innerText = "MENUNGGU LAWAN..."; txt.className = "text-2xl font-black uppercase text-rose-500";
            btn.innerText = "MENUNGGU LAWAN..."; btn.className = "w-full py-3 bg-slate-200 text-slate-500 border-2 border-slate-300 rounded-xl font-black";
        }
    }

    function checkDraftDone() {
        if(myTeam.length === 5 && oppTeam.length === 5) {
            document.getElementById('draft-turn-text').innerText = "MEMASUKI ARENA...";
            setTimeout(initBattle, 1500);
        }
    }

    // ==========================================
    // 4. BATTLE ARENA (TOP LAYER SPRITE & HP)
    // ==========================================
    function initBattle() {
        document.getElementById('draft-screen').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden');
        
        setActive('p1', 0); setActive('p2', 0); 
        state.turn = 'p1'; updateBoardLock();
        
        if(myRole === 'host') {
            generateBoardData();
            setTimeout(()=> channel.publish('board-init', { b: board.map(row=>row.map(c=>c.pIdx)) }), 500);
        }

        channel.subscribe('board-init', (msg) => { if(myRole === 'guest') { renderBoardFromData(msg.data.b); updateBoardLock(); } });
        channel.subscribe('attack', async (msg) => { if(msg.data.sender !== myRole) await processReceivedAttack(msg.data); });
        channel.subscribe('end-turn', (msg) => {
            if(msg.data.nextTurn === myTurnId) { renderBoardFromData(msg.data.boardState); state.turn = myTurnId; updateBoardLock(); state.isAnim = false; }
        });
    }

    function setActive(side, idx) {
        const team = side === 'p1' ? myTeam : oppTeam;
        const poke = team[idx];
        const spriteEl = document.getElementById(`${side}-sprite`);
        
        if(side === 'p1') { state.myActive = idx; document.getElementById('player-name').innerText = poke.name; }
        else { state.oppActive = idx; document.getElementById('enemy-name').innerText = poke.name; }

        spriteEl.src = poke.spriteA; spriteEl.onerror = function(){this.src=poke.spriteS;};
        
        if(side === 'p1') updateMyHp(); else updateOppHp();
    }

    function updateMyHp() {
        const poke = myTeam[state.myActive]; const pct = Math.max(0, (poke.hp / poke.maxHp) * 100);
        const bar = document.getElementById('player-hp-bar'); bar.style.width = `${pct}%`;
        bar.style.backgroundColor = pct>50 ? '#10b981' : pct>20 ? '#facc15' : '#ef4444';
        
        const box = document.getElementById('player-hp-box'); const sprite = document.getElementById('p1-sprite');
        const shadow = document.querySelector('#p1-container .ground-shadow');
        if(poke.hp <= 0) { box.style.opacity = '0'; sprite.classList.add('opacity-0'); shadow.style.opacity = '0'; }
        else { box.style.opacity = '1'; sprite.classList.remove('opacity-0'); shadow.style.opacity = '1'; }
    }

    function updateOppHp() {
        const poke = oppTeam[state.oppActive]; const pct = Math.max(0, (poke.hp / poke.maxHp) * 100);
        const bar = document.getElementById('enemy-hp-bar'); bar.style.width = `${pct}%`;
        bar.style.backgroundColor = pct>50 ? '#10b981' : pct>20 ? '#facc15' : '#ef4444';
        
        const box = document.getElementById('enemy-hp-box'); const sprite = document.getElementById('p2-sprite');
        const shadow = document.querySelector('#p2-container .ground-shadow');
        if(poke.hp <= 0) { box.style.opacity = '0'; sprite.classList.add('opacity-0'); shadow.style.opacity = '0'; }
        else { box.style.opacity = '1'; sprite.classList.remove('opacity-0'); shadow.style.opacity = '1'; }
    }

    function setLog(txt) { document.getElementById('log-text').innerText = txt; }
    function updateBoardLock() {
        if(state.turn === myTurnId) { document.getElementById('board-lock').classList.add('hidden'); setLog("Giliranmu! Cocokkan puzzle."); }
        else { document.getElementById('board-lock').classList.remove('hidden'); setLog("Menunggu lawan menyerang..."); }
    }

    function showEpicMove(moveName) {
        sEpic(); const el = document.getElementById('epic-move'); el.innerText = `${moveName.toUpperCase()}!`;
        el.classList.remove('show-move'); void el.offsetWidth; el.classList.add('show-move');
    }

    // ==========================================
    // 5. PUZZLE 6x6 & RPG DAMAGE LOGIC
    // ==========================================
    const boardEl = document.getElementById('board'); const gemsContainer = document.getElementById('gems-container');

    function generateBoardData() {
        gemsContainer.innerHTML=''; board=[];
        for (let y=0; y<ROWS; y++) {
            board[y]=[];
            for (let x=0; x<COLS; x++) {
                let pIdx; do { pIdx = Math.floor(Math.random() * 5); } 
                while ((x>=2 && board[y][x-1].pIdx===pIdx && board[y][x-2].pIdx===pIdx) || (y>=2 && board[y-1][x].pIdx===pIdx && board[y-2][x].pIdx===pIdx));
                const gem = createGem(x, y, pIdx); board[y][x] = { pIdx, el: gem };
            }
        }
    }
    function renderBoardFromData(dataMatrix) {
        gemsContainer.innerHTML=''; board=[];
        for (let y=0; y<ROWS; y++) { board[y]=[]; for (let x=0; x<COLS; x++) { const gem = createGem(x, y, dataMatrix[y][x]); board[y][x] = { pIdx: dataMatrix[y][x], el: gem }; } }
    }

    function createGem(x, y, pIdx) {
        const div = document.createElement('div'); div.className = 'gem';
        const img = document.createElement('img'); img.src = myTeam[pIdx].spriteS; img.setAttribute('draggable', 'false'); div.appendChild(img);
        updatePos(div, x, y); gemsContainer.appendChild(div); return div;
    }
    function updatePos(el, x, y) { el.style.left = `${x * 16.666}%`; el.style.top = `${y * 16.666}%`; }

    let dStartX=0, dStartY=0, sCol=-1, sRow=-1, isDrag=false;
    function getGridPos(e) {
        const cX = e.touches ? e.touches[0].clientX : e.clientX; const cY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = boardEl.getBoundingClientRect(); if(cX<rect.left || cX>rect.right || cY<rect.top || cY>rect.bottom) return {x:-1,y:-1};
        return { x: Math.floor((cX - rect.left) / (rect.width/COLS)), y: Math.floor((cY - rect.top) / (rect.height/ROWS)) };
    }
    function onDown(e) {
        if(state.isAnim || state.turn !== myTurnId) return; const p = getGridPos(e);
        if(p.x>=0 && p.y>=0) { isDrag=true; dStartX = e.touches?e.touches[0].clientX:e.clientX; dStartY = e.touches?e.touches[0].clientY:e.clientY; sCol=p.x; sRow=p.y; if(board[sRow] && board[sRow][sCol]) board[sRow][sCol].el.classList.add('swiping'); }
    }
    function onMove(e) {
        if(!isDrag || state.isAnim) return; if(e.touches) e.preventDefault();
        const dx = (e.touches?e.touches[0].clientX:e.clientX) - dStartX, dy = (e.touches?e.touches[0].clientY:e.clientY) - dStartY;
        if(Math.abs(dx)>25 || Math.abs(dy)>25) {
            isDrag=false; if(board[sRow] && board[sRow][sCol]) board[sRow][sCol].el.classList.remove('swiping');
            let tC=sCol, tR=sRow; if(Math.abs(dx)>Math.abs(dy)) dx>0?tC++:tC--; else dy>0?tR++:tR--;
            if(tC>=0 && tC<COLS && tR>=0 && tR<ROWS) trySwap(sCol, sRow, tC, tR);
        }
    }
    function onUp() { if(isDrag&&board[sRow]&&board[sRow][sCol]) board[sRow][sCol].el.classList.remove('swiping'); isDrag=false; }
    boardEl.addEventListener('mousedown', onDown); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    boardEl.addEventListener('touchstart', onDown, {passive:false}); boardEl.addEventListener('touchmove', onMove, {passive:false}); boardEl.addEventListener('touchend', onUp);

    async function trySwap(x1, y1, x2, y2) {
        state.isAnim=true; pT(500); doSwap(x1,y1,x2,y2); await sleep(200);
        let groups = findMatchGroups();
        if(groups.length>0) { await processMyMatches(groups); } else { pT(200); doSwap(x1,y1,x2,y2); await sleep(200); state.isAnim=false; }
    }
    function doSwap(x1,y1,x2,y2) { let t=board[y1][x1]; board[y1][x1]=board[y2][x2]; board[y2][x2]=t; updatePos(board[y1][x1].el,x1,y1); updatePos(board[y2][x2].el,x2,y2); }

    function findMatchGroups() {
        let groupMap = {}; 
        for(let y=0;y<ROWS;y++) for(let x=0;x<COLS-2;x++) {
            if(!board[y][x]) continue; let id = board[y][x].pIdx;
            if(board[y][x+1] && board[y][x+1].pIdx===id && board[y][x+2] && board[y][x+2].pIdx===id) {
                if(!groupMap[id]) groupMap[id] = new Set(); groupMap[id].add(`${x},${y}`); groupMap[id].add(`${x+1},${y}`); groupMap[id].add(`${x+2},${y}`);
                let cx=x+3; while(cx<COLS && board[y][cx] && board[y][cx].pIdx===id) {groupMap[id].add(`${cx},${y}`); cx++;}
            }
        }
        for(let x=0;x<COLS;x++) for(let y=0;y<ROWS-2;y++) {
            if(!board[y][x]) continue; let id = board[y][x].pIdx;
            if(board[y+1][x] && board[y+1][x].pIdx===id && board[y+2][x] && board[y+2][x].pIdx===id) {
                if(!groupMap[id]) groupMap[id] = new Set(); groupMap[id].add(`${x},${y}`); groupMap[id].add(`${x},${y+1}`); groupMap[id].add(`${x},${y+2}`);
                let cy=y+3; while(cy<ROWS && board[cy][x] && board[cy][x].pIdx===id) {groupMap[id].add(`${x},${cy}`); cy++;}
            }
        }
        return Object.keys(groupMap).map(k => ({ pIdx: parseInt(k), cells: Array.from(groupMap[k]).map(s=>{let [x,y]=s.split(','); return {x:+x,y:+y};}) }));
    }

    async function processMyMatches(groups) {
        for (let group of groups) {
            let myPoke = myTeam[group.pIdx]; let oppPoke = oppTeam[state.oppActive];
            if(state.myActive !== group.pIdx) setActive('p1', group.pIdx);

            let ax=0, ay=0;
            group.cells.forEach(({x,y}) => {
                if(board[y][x]) { const g=board[y][x]; g.el.classList.add('popping'); setTimeout(()=>g.el.remove(), 200); board[y][x]=null; }
                ax+=x; ay+=y;
            });

            let isFainted = myPoke.hp <= 0;
            let finalDmg = 0; let usedMoveName = ""; let isCrit = false;

            if (isFainted) {
                sFaint(); setLog(`${myPoke.name} sudah PINGSAN!`);
                showFloatingDmg(ax/group.cells.length, ay/group.cells.length, "PINGSAN!", false);
                await sleep(800);
            } else {
                if(!myPoke.learnedMove) myPoke.learnedMove = await fetchAttackMove(myPoke.rawMoves);
                usedMoveName = myPoke.learnedMove.name;
                showEpicMove(usedMoveName); await sleep(600); 

                // PHY VS SPECIAL CALCULATION
                let atkStat = myPoke.learnedMove.class === 'special' ? myPoke.spa : myPoke.atk;
                let defStat = myPoke.learnedMove.class === 'special' ? oppPoke.spd : oppPoke.def;
                
                let mult = 1;
                if(typeRels[myPoke.type]) {
                    if(typeRels[myPoke.type].double.includes(oppPoke.type)) mult *= 2;
                    if(typeRels[myPoke.type].half.includes(oppPoke.type)) mult *= 0.5;
                    if(typeRels[myPoke.type].zero.includes(oppPoke.type)) mult *= 0;
                }

                let baseDmg = Math.floor((atkStat / defStat) * (myPoke.learnedMove.power / 2) * (group.cells.length/3));
                
                // CRITICAL HIT SYSTEM BERDASARKAN SPEED
                isCrit = Math.random() < (myPoke.spe / 255); // Max speed usually ~150-160, so roughly 10-20% chance
                if (isCrit) { baseDmg *= 1.5; setLog(`CRITICAL HIT dari ${myPoke.name}!`); }
                else { setLog(`${myPoke.name} mendaratkan serangan!`); }

                finalDmg = Math.max(5, Math.floor(baseDmg * mult * (0.85 + Math.random()*0.3)));

                sHit(isCrit); 
                showFloatingDmg(ax/group.cells.length, ay/group.cells.length, `-${finalDmg}`, isCrit);
                
                const p1S = document.getElementById('p1-sprite'); const p2S = document.getElementById('p2-sprite');
                p1S.classList.add('attack-lunge-p1'); await sleep(200); p2S.classList.add('hit-flash');
                
                oppPoke.hp -= finalDmg; updateOppHp();
                await sleep(300); p1S.classList.remove('attack-lunge-p1'); p2S.classList.remove('hit-flash');

                if(oppPoke.hp <= 0) { sFaint(); setLog(`${oppPoke.name} milik lawan Pingsan!`); }
            }

            channel.publish('attack', { sender: myRole, myActiveIdx: group.pIdx, damage: finalDmg, isFainted: isFainted, moveName: usedMoveName, isCrit: isCrit });
            if(oppTeam.every(t=>t.hp<=0)) break; 
        }

        if(oppTeam.every(t=>t.hp<=0)) { endGame(true); return; }

        await applyGravity(); let nextG = findMatchGroups();
        if(nextG.length>0) { await sleep(200); await processMyMatches(nextG); }
        else {
            state.turn = myTurnId === 'p1' ? 'p2' : 'p1';
            channel.publish('end-turn', { nextTurn: state.turn, boardState: board.map(r=>r.map(c=>c.pIdx)) });
            updateBoardLock(); state.isAnim = false;
        }
    }

    async function processReceivedAttack(data) {
        state.isAnim = true;
        let oppPokeIdx = data.myActiveIdx; let dmg = data.damage;
        
        if(state.oppActive !== oppPokeIdx) setActive('p2', oppPokeIdx);
        let oppPoke = oppTeam[oppPokeIdx]; let myPoke = myTeam[state.myActive];

        if(data.isFainted) {
            sFaint(); setLog(`Lawan mencocokkan Pokemon pingsan!`);
        } else {
            if(data.moveName) { showEpicMove(data.moveName); await sleep(600); }

            sHit(data.isCrit); setLog(data.isCrit ? `CRITICAL HIT dari lawan!` : `${oppPoke.name} lawan menyerang!`);
            const p1S = document.getElementById('p1-sprite'); const p2S = document.getElementById('p2-sprite');
            p2S.classList.add('attack-lunge-p2'); await sleep(200); p1S.classList.add('hit-flash'); 
            
            myPoke.hp -= dmg; updateMyHp();
            
            await sleep(300); p2S.classList.remove('attack-lunge-p2'); p1S.classList.remove('hit-flash'); 

            if(myPoke.hp <= 0) { sFaint(); setLog(`${myPoke.name} Pingsan! Cocokkan yg lain.`); }
        }

        if(myTeam.every(t=>t.hp<=0)) { endGame(false); }
    }

    async function applyGravity() {
        let moved=false;
        for(let x=0;x<COLS;x++) {
            let emp=0;
            for(let y=ROWS-1;y>=0;y--) {
                if(!board[y][x]) emp++;
                else if(emp>0) { let g=board[y][x]; board[y+emp][x]=g; board[y][x]=null; updatePos(g.el,x,y+emp); moved=true; }
            }
            for(let i=0;i<emp;i++) {
                let pIdx=Math.floor(Math.random()*5); let ny=emp-1-i; let g=createGem(x,-1-i,pIdx);
                board[ny][x]={pIdx,el:g}; gemsContainer.appendChild(g); setTimeout(()=>updatePos(g,x,ny),50); moved=true;
            }
        }
        if(moved) await sleep(200);
    }

    function showFloatingDmg(x, y, txt, isCrit) {
        const el=document.createElement('div'); el.innerText=txt;
        el.className = isCrit ? 'floating-dmg floating-crit' : 'floating-dmg';
        const r=boardEl.getBoundingClientRect(); el.style.left=`${x*(r.width/COLS)+(r.width/COLS/2)}px`; el.style.top=`${y*(r.height/ROWS)+(r.height/ROWS/2)}px`;
        boardEl.appendChild(el); setTimeout(()=>el.remove(), 1000);
    }

    function endGame(win) {
        state.isAnim = true; const m = document.getElementById('game-over');
        if(win) { document.getElementById('result-title').innerText="MENANG!"; document.getElementById('result-title').className="text-6xl font-black mb-2 text-sky-500"; document.getElementById('result-subtitle').innerText="Semua Pokemon musuh kalah!"; }
        else { document.getElementById('result-title').innerText="KALAH"; document.getElementById('result-title').className="text-6xl font-black mb-2 text-rose-500"; document.getElementById('result-subtitle').innerText="Semua Pokemon-mu pingsan!"; }
        setTimeout(() => m.classList.remove('hidden'), 1000);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
